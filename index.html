<!DOCTYPE html>
<html lang="en">
<script src="kohinoorscript.js"></script>
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kohinoor Pharma and Cosmetics</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Banner -->
    <header class="bg-primary text-white text-center py-4">
        <h1 class="fw-bold">Kohinoor Pharma and Cosmetics</h1>
        <p class="mb-0">Your Trusted Healthcare Partner</p>
    </header>

    <!-- Images Section -->
    <section class="container my-4">
        <div class="row g-3 justify-content-center"> 
            <div class="col-md-4">
                <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b"
                     class="img-fluid rounded" alt="Pharmacy">
            </div>
            <div class="col-md-4">
                <img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5"
                     class="img-fluid rounded" alt="Medical">
            </div>
        </div>
    </section>

    <!-- Contact Info -->
    <section class="container my-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title text-primary">Contact Information</h2>
                <p><strong>Address:</strong> 123, Healthcare Street, Mumbai, India</p>
                <p><strong>Phone:</strong> +91 98765 43210</p>
                <p><strong>Email:</strong> info@kohinoorpharma.com</p>

                <button class="btn btn-primary mt-2" onclick="showMessage()">
                    Press Me
                </button>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-light text-center py-3 mt-4">
        <p class="mb-0">© 2026 Kohinoor Pharma and Cosmetics</p>
        <h4>Location: Balrampur</h4>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
